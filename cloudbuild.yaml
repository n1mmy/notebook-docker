steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_IMAGE_TAG', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--build-arg=VARIANT=ml-gpu', '-t', 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_IMAGE_TAG-ml-gpu', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--build-arg=VARIANT=ml-cpu', '-t', 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_IMAGE_TAG-ml-cpu', '.']
images:
  - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_IMAGE_TAG'
  - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_IMAGE_TAG-ml-gpu'
  - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_IMAGE_TAG-ml-cpu'
timeout: '2h'
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 40
substitutions:
  _IMAGE_NAME: 'notebook'
  _IMAGE_TAG: 'latest'
