
---
apiVersion: batch/v1
kind: Job
metadata:
  name: notebook-job
spec:
  template:
    spec:
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: storage
        emptyDir: {}
      initContainers:
      - image: alpine/git:v2.45.2
        name: git
        volumeMounts:
        - mountPath: /storage
          name: storage
        command:
        - git
        args:
        - clone
        - https://github.com/n1mmy/notebook-docker
        - /storage
      containers:
      - image: ghcr.io/n1mmy/notebook:main
        name: notebook
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /home/ubuntu/notebooks
          name: storage
        command:
        - /home/ubuntu/run-notebook.sh
        args:
        - /home/ubuntu/notebooks/example.ipynb
        - more
        - args
        resources:
          ## Uncomment to add a GPU
          # limits:
          #  nvidia.com/gpu: 1
          requests:
            cpu: 1
            memory: 2Gi
      restartPolicy: Never
  backoffLimit: 0
