steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--build-arg=VARIANT=gpu', '-t', 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_IMAGE_TAG-gpu', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--build-arg=VARIANT=cpu', '-t', 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_IMAGE_TAG-cpu', '.']
images:
  - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_IMAGE_TAG-gpu'
  - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_IMAGE_TAG-cpu'
timeout: '2h'
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 40
substitutions:
  _IMAGE_NAME: 'notebook'
  _IMAGE_TAG: 'latest'
